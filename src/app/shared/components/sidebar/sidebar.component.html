<aside class="sidebar">

  <!-- LOGO -->
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-6h6v6"/>
        <path d="M12 3v4M8 7h8"/>
      </svg>
    </div>
    <div class="logo-text">
      <span class="logo-title">HOTEL CUENCA</span>
      <span class="logo-subtitle">PMS</span>
    </div>
  </div>

  <!-- USUARIO -->
  <div class="user-info">
    <div class="user-avatar">
      {{ (nombreUsuario || 'U').charAt(0).toUpperCase() }}
    </div>
    <div class="user-details">
      <div class="user-name">{{ nombreUsuario }}</div>
      <div class="user-role">Administrador</div>
    </div>
  </div>

  <!-- MENÚ -->
  <nav class="sidebar-nav">
    <a
      class="nav-item"
      *ngFor="let item of menuVisible"
      [routerLink]="item.ruta"
      routerLinkActive="activo"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <span class="nav-icon">
        <!-- HOME (Dashboard) -->
        <svg *ngIf="item.icon === 'home'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H4a2 2 0 0 1-2-2z"/>
          <path d="M9 22v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4"/>
        </svg>

        <!-- DASHBOARD (analytics) -->
        <svg *ngIf="item.icon === 'dashboard'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>

        <!-- USUARIOS -->
        <svg *ngIf="item.icon === 'users'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>

        <!-- ROLES (escudo/seguridad) -->
        <svg *ngIf="item.icon === 'roles'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="M12 8v4M12 16h.01"/>
        </svg>

        <!-- MAPA -->
        <svg *ngIf="item.icon === 'map'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/>
          <path d="M8 2v16M16 6v16"/>
        </svg>

        <!-- RESERVAS (calendario) -->
        <svg *ngIf="item.icon === 'calendar'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>

        <!-- TIPOS DE HABITACIÓN (etiqueta) -->
        <svg *ngIf="item.icon === 'tag'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-1.41.59H5a2 2 0 0 1-2-2v-6a2 2 0 0 1 .59-1.41L11 3l9.59 9.59z"/>
          <circle cx="7" cy="7" r="1.5" fill="currentColor"/>
        </svg>

        <!-- HABITACIONES (puerta/cama) -->
        <svg *ngIf="item.icon === 'door'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M3 21h18M5 21V7l7-4 7 4v14"/>
          <path d="M15 10h2M15 13h2M15 16h2"/>
          <circle cx="12" cy="10" r="1" fill="currentColor"/>
        </svg>

        <!-- CHECK-IN -->
        <svg *ngIf="item.icon === 'check-in'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M12 22v-7l-3 3M12 15l3 3"/>
          <path d="M5 5h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2"/>
          <circle cx="12" cy="9" r="2" fill="currentColor"/>
        </svg>

        <!-- CHECK-OUT -->
        <svg *ngIf="item.icon === 'check-out'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M12 15v7l3-3M12 22l-3-3"/>
          <path d="M19 5H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2"/>
          <circle cx="12" cy="9" r="2" fill="currentColor"/>
        </svg>

        <!-- PLANES TARIFARIOS (dinero) -->
        <svg *ngIf="item.icon === 'money'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M12 2v20M17 4H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          <line x1="12" y1="8" x2="12" y2="16"/>
        </svg>

        <!-- LIMPIEZA (escoba/sparkles) -->
        <svg *ngIf="item.icon === 'sparkles'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M5 3l2 6 6 2-6 2-2 6-2-6-6-2 6-2 2-6z"/>
          <path d="M18 8l1 3 3 1-3 1-1 3-1-3-3-1 3-1 1-3z"/>
        </svg>

        <!-- TICKETS MANTENIMIENTO (herramienta) -->
        <svg *ngIf="item.icon === 'wrench'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>

        <!-- INVENTARIO (caja) -->
        <svg *ngIf="item.icon === 'cube'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </span>
      <span class="nav-label">{{ item.label }}</span>
    </a>
  </nav>

  <!-- FOOTER -->
  <div class="sidebar-footer">
    <button class="btn-logout" type="button" (click)="cerrarSesion()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span>Cerrar Sesión</span>
    </button>
  </div>

</aside>
