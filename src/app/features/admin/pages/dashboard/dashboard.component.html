<div class="dashboard-container">
  
  <div class="search-section">
    <div class="search-input-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" class="search-input" placeholder="Search rooms, bookings or guests...">
    </div>
  </div>

  <div class="dashboard-header">
    <div class="header-titles">
      <h1 class="main-title">Available Inventory</h1>
      <p class="subtitle">A curated collection of luxury spaces for your elite clientele.</p>
    </div>
    
    <div class="header-actions">
      <button class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
        </svg>
        <span>FILTER TYPES</span>
      </button>
      <button class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <polyline points="19 12 12 19 5 12"></polyline>
        </svg>
        <span>SORT BY PRICE</span>
      </button>
    </div>
  </div>

  <div class="inventory-grid">
    <div class="room-card" *ngFor="let hab of habitaciones">
      <div class="card-image-wrapper">
        <img [src]="hab.imagen" [alt]="hab.nombre" class="room-image">
        <div class="badge" [ngClass]="hab.tipoEtiqueta">
          <span class="dot" *ngIf="hab.tipoEtiqueta === 'available' || hab.tipoEtiqueta === 'danger'"></span>
          {{ hab.etiqueta }}
        </div>
      </div>
      
      <div class="card-content">
        <div class="room-header">
          <h2 class="room-title">{{ hab.nombre }}</h2>
          <div class="room-price-info">
            <span class="price">${{ hab.precio }}</span>
            <span class="per-night">PER NIGHT</span>
          </div>
        </div>
        
        <p class="room-description">{{ hab.descripcion }}</p>
        
        <div class="card-footer">
          <div class="amenities">
            <svg class="amenity-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
            <svg class="amenity-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5l-5 5-5-5M22 12H2M17 19l-5-5-5 5M20 16l-3.5-3.5M4 8l3.5 3.5M20 8l-3.5 3.5M4 16l3.5-3.5"/></svg>
            <svg class="amenity-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
            <svg class="amenity-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 22h8M12 15v7M12 15a6 6 0 0 0 6-6V2H6v7a6 6 0 0 0 6 6z"/></svg>
          </div>
          <button class="view-details-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            VIEW DETAILS
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="metrics-container">
    <div class="metric-card">
      <div class="metric-title">OCCUPANCY</div>
      <div class="metric-value-container">
        <div class="metric-value">84.2%</div>
        <div class="metric-trend text-success">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M7 17l9.2-9.2M17 17V7H7"/></svg>
          +3.1% vs last week
        </div>
      </div>
    </div>
    
    <div class="metric-card">
      <div class="metric-title">ADR</div>
      <div class="metric-value-container">
        <div class="metric-value">$582</div>
        <div class="metric-subtext">Average Daily Rate</div>
      </div>
    </div>
    
    <div class="metric-card forecast-card">
      <div class="forecast-info">
        <div class="metric-title">REVENUE FORECAST</div>
        <div class="metric-value">$42,900</div>
        <div class="metric-subtext highlight">Target: $50,000</div>
      </div>
      <div class="circular-progress">
        <div class="progress-value">85%</div>
        <svg class="progress-ring" width="80" height="80">
          <circle class="progress-ring-circle-bg" stroke="rgba(255,255,255,0.05)" stroke-width="6" fill="transparent" r="32" cx="40" cy="40"/>
          <circle class="progress-ring-circle" stroke="#D4AF37" stroke-width="6" stroke-dasharray="200" stroke-dashoffset="30" stroke-linecap="round" fill="transparent" r="32" cx="40" cy="40"/>
        </svg>
      </div>
    </div>
  </div>
</div>
