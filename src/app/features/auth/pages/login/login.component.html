<main class="bg-image login-container">

  <section class="glass-card login-card">

    <header class="login-header">
      <div class="logo-container">
        <div class="logo-circle">
          <span class="logo-letter">M</span>
        </div>
      </div>
      <h1 class="brand-title">HOTEL & RESORTS</h1>
      <p class="brand-subtitle">Property Management System</p>
    </header>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form" autocomplete="off">

      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input class="glass-input" formControlName="nombreUsuario" placeholder="Ingrese su nombre de usuario"
          type="text" [class.input-error]="f['nombreUsuario'].invalid && f['nombreUsuario'].touched" />
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>

        <div class="input-with-icon">
          <input class="glass-input" formControlName="contrasena" placeholder="••••••••"
            [type]="mostrarPassword ? 'text' : 'password'"
            [class.input-error]="f['contrasena'].invalid && f['contrasena'].touched" />

          <button type="button" class="toggle-password" (click)="mostrarPassword = !mostrarPassword">
            <img [src]="mostrarPassword ? '/assets/icons/eye-off.svg' : '/assets/icons/eye.svg'"
              class="password-icon" />
          </button>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" [disabled]="loginForm.invalid || cargando" class="btn-submit">
          <ng-container *ngIf="!cargando; else loading">
            INGRESAR AL SISTEMA
          </ng-container>
          <ng-template #loading>
            <mat-spinner diameter="20"></mat-spinner>
            Verificando...
          </ng-template>
        </button>
      </div>

    </form>

  </section>

</main>
